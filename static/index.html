<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>MiniNetTalk</title>
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{
      --bg:#0e1621;
      --panel:#17212b;
      --panel2:#1f2c3a;
      --text:#e6edf3;
      --muted:#9fb0c0;
      --accent:#2b7cff;
      --accent2:#4aa3ff;
      --danger:#ff5d5d;
      --ok:#22c55e;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 18px;
      --radius2: 14px;
      --gap: 12px;
      --font: system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      font-family: var(--font);
      background: radial-gradient(1200px 800px at 20% -10%, rgba(43,124,255,.25), transparent 55%),
      radial-gradient(1200px 800px at 110% 10%, rgba(74,163,255,.18), transparent 60%),
      var(--bg);
      color: var(--text);
      display:flex;
      justify-content:center;
      padding: 18px;
    }

    .app{
      width: min(980px, 100%);
      height: min(860px, 100%);
      display:grid;
      grid-template-rows: auto 1fr auto;
      gap: var(--gap);
    }

    /* Top bar */
    .topbar{
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 14px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }
    .brand{
      display:flex; align-items:center; gap:12px;
      min-width: 0;
    }
    .logo{
      width: 42px; height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(43,124,255,1), rgba(74,163,255,1));
      display:grid; place-items:center;
      box-shadow: 0 8px 18px rgba(43,124,255,.25);
      flex: 0 0 auto;
    }
    .logo svg{ width: 22px; height: 22px; opacity:.95; }
    .titlewrap{ min-width:0; }
    .title{
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .2px;
      margin:0;
      line-height: 1.15;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .subtitle{
      margin: 4px 0 0 0;
      font-size: 12px;
      color: var(--muted);
      display:flex; align-items:center; gap:8px;
      flex-wrap: wrap;
    }
    .dot{
      width:8px; height:8px; border-radius:99px; display:inline-block;
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(255,93,93,.12);
    }
    .dot.ok{
      background: var(--ok);
      box-shadow: 0 0 0 4px rgba(34,197,94,.12);
    }
    .pill{
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      display:flex; align-items:center; gap:8px;
      user-select:none;
    }
    .pill strong{ font-weight: 700; }
    .btn{
      appearance:none;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 12px;
      font-weight: 650;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease, opacity .12s ease;
      display:inline-flex; align-items:center; gap:8px;
      white-space: nowrap;
    }
    .btn:hover{ transform: translateY(-1px); border-color: rgba(255,255,255,.16); background: rgba(255,255,255,.08); }
    .btn:active{ transform: translateY(0px) scale(.99); }
    .btn.primary{
      background: linear-gradient(135deg, rgba(43,124,255,.95), rgba(74,163,255,.92));
      border-color: rgba(43,124,255,.45);
      box-shadow: 0 10px 22px rgba(43,124,255,.22);
    }
    .btn.danger{
      background: rgba(255,93,93,.10);
      border-color: rgba(255,93,93,.30);
      color: #ffd7d7;
    }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; transform:none; }

    /* Main chat */
    .main{
      background: color-mix(in srgb, var(--panel) 90%, transparent);
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow:hidden;
      display:grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .chatHeader{
      padding: 12px 14px;
      display:flex;
      gap: 10px;
      align-items:center;
      justify-content:space-between;
      background: rgba(0,0,0,.14);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .nameBox{
      display:flex; gap:10px; align-items:center;
      min-width: 0;
      width: 100%;
    }
    .input{
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      outline:none;
      transition: border-color .12s ease, background .12s ease;
      min-width: 0;
    }
    .input:focus{
      border-color: rgba(74,163,255,.55);
      background: rgba(255,255,255,.08);
    }

    .messages{
      padding: 14px;
      overflow:auto;
      min-height: 0;
      display:flex;
      flex-direction: column;
      gap: 10px;
      background:
              radial-gradient(900px 500px at 20% 0%, rgba(43,124,255,.06), transparent 60%),
              radial-gradient(900px 500px at 90% 10%, rgba(74,163,255,.05), transparent 65%),
              rgba(0,0,0,.08);
    }

    .row{
      display:flex;
      align-items:flex-end;
      gap: 10px;
    }
    .row.me{ justify-content:flex-end; }
    .bubble{
      max-width: min(78%, 720px);
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 10px 12px;
      line-height: 1.35;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .row.me .bubble{
      background: linear-gradient(135deg, rgba(43,124,255,.36), rgba(74,163,255,.26));
      border-color: rgba(74,163,255,.30);
    }
    .meta{
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
      display:flex;
      gap: 8px;
      align-items:center;
      justify-content: space-between;
    }
    .sender{
      font-weight: 700;
      color: color-mix(in srgb, var(--text) 86%, var(--muted));
    }
    .time{ opacity:.9; }

    .system{
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,.05);
      border: 1px dashed rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 10px 12px;
      align-self: center;
      max-width: 92%;
      white-space: pre-wrap;
    }

    /* Composer */
    .composer{
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 12px;
      display:flex;
      gap: 10px;
      align-items:center;
    }
    .composer .input{
      border-radius: 999px;
      padding: 12px 14px;
    }
    .sendBtn{
      flex: 0 0 auto;
      min-width: 110px;
      justify-content:center;
    }

    @media (max-width: 520px){
      body{ padding: 10px; }
      .logo{ width: 40px; height: 40px; }
      .btn{ padding: 10px 10px; }
      .sendBtn{ min-width: 92px; }
      .bubble{ max-width: 86%; }
    }
  </style>
</head>

<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M21 3L3.7 10.2c-.9.4-.86 1.7.06 2l4.8 1.6 1.8 5.3c.3.9 1.5 1 2 .2l2.8-4 4.9 3.6c.8.6 1.9.1 2.1-.9L22 4.1c.2-.9-.7-1.6-1.6-1.1z" fill="rgba(255,255,255,.92)"/>
        </svg>
      </div>
      <div class="titlewrap">
        <p class="title">MiniNetTalk</p>
        <p class="subtitle">
          <span id="statusDot" class="dot" aria-hidden="true"></span>
          <span id="statusText">未连接</span>
          <span class="pill" title="当前使用的 WebSocket 地址（自动计算）">
              <strong>WS</strong>
              <span id="wsUrlText" style="opacity:.9"></span>
            </span>
        </p>
      </div>
    </div>

    <div style="display:flex; gap:10px; align-items:center;">
      <button id="btnReconnect" class="btn primary" type="button">重连</button>
      <button id="btnDisconnect" class="btn danger" type="button">断开</button>
    </div>
  </div>

  <div class="main">
    <div class="chatHeader">
      <div class="nameBox">
        <input id="userName" class="input" maxlength="32" placeholder="你的昵称（可不填，默认为 null）" />
      </div>
      <div class="pill" title="你的客户端实例 ID（用于避免回环）">
        <strong>ID</strong>
        <span id="clientIdText" style="opacity:.9"></span>
      </div>
    </div>

    <div id="messages" class="messages" aria-live="polite" aria-label="聊天消息区域"></div>
  </div>

  <div class="composer">
    <input id="sendMessage" class="input" placeholder="输入消息…（Enter 发送，Shift+Enter 换行）" />
    <button id="btnSend" class="btn primary sendBtn" type="button">发送</button>
  </div>
</div>

<script>
  /**
   * ✅ 目标：
   * 1) 自动连接/重连（用户不填地址）
   * 2) 指数退避 + 抖动，避免疯狂打后端
   * 3) 防止“刷新/重连导致服务器死循环”：前端侧做“自发消息标记 + 去重/丢弃回环”
   *
   * ⚠️ 重要说明（避免误会）：
   * - 如果你的后端写成“收到任何消息 -> 再 send() 回去给所有人（包括发送者）-> 发送者再自动回发”，那肯定会死循环。
   * - 前端这里会在消息里加 clientId，并且收到自己发的回声会丢弃（可选：也可以展示为“已发送”气泡）。
   * - 同时我们做了连接状态机，保证：同一时刻只有一个 WS 实例，重连计时器也不会叠加。
   */

          // ====== 自动推导 WebSocket 地址（用户不需要填） ======
          // 默认：与当前网页同源。http(s) -> ws(s)，路径用 /ws （你可按后端改）
  const WS_PATH = "/ws"; // ← 如果你的后端不是 /ws，把这里改成 "/" 或 "/chat" 等
  function computeWsUrl(){
    const proto = (location.protocol === "https:") ? "wss:" : "ws:";
    return `${proto}//${location.host}${WS_PATH}`;
  }

  // ====== 基础工具 ======
  const $ = (id) => document.getElementById(id);

  function nowTime(){
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    return `${hh}:${mm}`;
  }

  // 生成稳定 clientId：同一标签页刷新也能变（避免“旧连接残留 + 新连接”混淆）
  // 但又不能每条消息都变，所以：每次加载生成一次
  const clientId = (() => {
    const arr = new Uint8Array(12);
    crypto.getRandomValues(arr);
    return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
  })();

  $("clientIdText").textContent = clientId.slice(0, 10);
  $("wsUrlText").textContent = computeWsUrl();

  // ====== UI 写入 ======
  function setStatus(connected, text){
    $("statusText").textContent = text;
    $("statusDot").classList.toggle("ok", !!connected);
    $("btnDisconnect").disabled = !connected;
    $("btnSend").disabled = !connected;
  }

  function addSystem(text){
    const div = document.createElement("div");
    div.className = "system";
    div.textContent = text;
    $("messages").appendChild(div);
    $("messages").scrollTop = $("messages").scrollHeight;
  }

  function addBubble({me, sender, text, time}){
    const row = document.createElement("div");
    row.className = "row" + (me ? " me" : "");

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    bubble.textContent = text;

    const meta = document.createElement("div");
    meta.className = "meta";

    const left = document.createElement("span");
    left.className = "sender";
    left.textContent = sender ?? "unknown";

    const right = document.createElement("span");
    right.className = "time";
    right.textContent = time ?? nowTime();

    meta.appendChild(left);
    meta.appendChild(right);

    bubble.appendChild(meta);
    row.appendChild(bubble);

    $("messages").appendChild(row);
    $("messages").scrollTop = $("messages").scrollHeight;
  }

  // ====== 防回环：给每条消息加 envelope ======
  // 约定 JSON（推荐）：{type:"chat", from:"name", clientId:"...", id:"...", text:"..."}
  // 若后端还是纯文本，也可以：前端会 fallback 解析显示。
  function makeMsgId(){
    // 简单去重ID（时间+随机）
    return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`;
  }

  const seenMsgIds = new Set(); // 防止重复显示（比如重连/服务器重复广播）
  function rememberMsg(id){
    if(!id) return;
    seenMsgIds.add(id);
    // 控制大小，避免无限增长
    if(seenMsgIds.size > 2000){
      // 简单清理：删一半
      let i = 0;
      for(const k of seenMsgIds){
        seenMsgIds.delete(k);
        if(++i > 1000) break;
      }
    }
  }

  // ====== 连接状态机 + 指数退避 ======
  let ws = null;
  let manualClose = false;

  let reconnectTimer = null;
  let attempt = 0;

  const backoff = {
    base: 500,    // 初始 0.5s
    cap: 15000,   // 最大 15s
    jitter: 0.25  // 抖动比例
  };

  function clearReconnectTimer(){
    if(reconnectTimer){
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
    }
  }

  function scheduleReconnect(reason){
    if(manualClose) return;

    clearReconnectTimer();
    attempt++;

    const exp = Math.min(backoff.cap, backoff.base * Math.pow(2, attempt - 1));
    const rand = (Math.random() * 2 - 1) * backoff.jitter; // [-jitter, +jitter]
    const delay = Math.max(200, Math.floor(exp * (1 + rand)));

    setStatus(false, `重连中…（第 ${attempt} 次，${delay}ms）`);
    addSystem(`⚠️ 连接断开：${reason}，将在 ${delay}ms 后自动重连（指数退避）`);

    reconnectTimer = setTimeout(() => {
      connect();
    }, delay);
  }

  function cleanupWs(){
    if(!ws) return;
    try{
      ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null;
      if(ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING){
        ws.close(1000, "client cleanup");
      }
    }catch(_){}
    ws = null;
  }

  function connect(){
    // 防止重复 connect 叠加造成“后端连接爆炸”
    clearReconnectTimer();

    // 如果已有连接/正在连接，就不再创建新的
    if(ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)){
      return;
    }

    manualClose = false;

    const url = computeWsUrl();
    $("wsUrlText").textContent = url;

    setStatus(false, "连接中…");
    addSystem("🔌 正在连接服务器…");

    try{
      ws = new WebSocket(url);
    }catch(e){
      addSystem(`❌ WebSocket 创建失败：${e?.message ?? e}`);
      scheduleReconnect("创建失败");
      return;
    }

    ws.onopen = () => {
      attempt = 0;
      setStatus(true, "已连接");
      addSystem("✅ 连接成功");

      // 可选：发一个 hello 让服务器记录昵称（但不要触发广播风暴）
      // 这里用 type: "hello" 并要求后端不要广播 hello，只用于绑定 session 信息
      safeSend({ type: "hello", clientId, from: getUserNameSafe(), ts: Date.now() });
    };

    ws.onclose = (ev) => {
      const reason = ev?.reason ? `${ev.reason}` : `code=${ev.code}`;
      setStatus(false, manualClose ? "已断开" : "连接已断开");
      addSystem(`🔌 连接关闭（${reason}）`);
      cleanupWs();

      if(!manualClose){
        scheduleReconnect(reason);
      }
    };

    ws.onerror = () => {
      // onerror 一般不提供太多信息，最终会触发 onclose
      addSystem("❗ 连接发生错误（将自动重连）");
    };

    ws.onmessage = (ev) => {
      handleIncoming(ev.data);
    };
  }

  function disconnect(){
    manualClose = true;
    clearReconnectTimer();
    if(ws){
      try{ ws.close(1000, "manual close"); }catch(_){}
    }
    cleanupWs();
    setStatus(false, "已断开");
    addSystem("⛔ 已手动断开连接");
  }

  // ====== 发送与接收（防回环核心） ======
  function getUserNameSafe(){
    const raw = ($("userName").value || "").trim();
    // 你要求：不填就是 null（字符串 null）
    return raw.length ? raw : "null";
  }

  function safeSend(obj){
    if(!ws || ws.readyState !== WebSocket.OPEN) return false;
    try{
      ws.send(JSON.stringify(obj));
      return true;
    }catch(e){
      addSystem(`❌ 发送失败：${e?.message ?? e}`);
      return false;
    }
  }

  function sendChat(){
    const text = $("sendMessage").value;
    const trimmed = text.replace(/\s+$/g, "");
    if(!trimmed) return;

    if(!ws || ws.readyState !== WebSocket.OPEN){
      addSystem("⚠️ 当前未连接，消息未发送（会自动重连）");
      scheduleReconnect("未连接");
      return;
    }

    const payload = {
      type: "chat",
      id: makeMsgId(),
      clientId,
      from: getUserNameSafe(),
      text: trimmed,
      ts: Date.now()
    };

    // 先在本地显示“我”的气泡（即使服务器会回声，也不会重复显示）
    rememberMsg(payload.id);
    addBubble({ me: true, sender: payload.from, text: payload.text, time: nowTime() });

    // 发送
    safeSend(payload);

    $("sendMessage").value = "";
    $("sendMessage").focus();
  }

  function handleIncoming(data){
    // 1) 优先解析 JSON
    let obj = null;
    if(typeof data === "string"){
      const s = data.trim();
      if(s.startsWith("{") && s.endsWith("}")){
        try{ obj = JSON.parse(s); }catch(_){}
      }
    }

    // 2) 如果是我们定义的 envelope
    if(obj && typeof obj === "object"){
      // hello / ping 之类系统消息：不当成聊天重复刷屏
      if(obj.type === "hello"){
        return;
      }
      if(obj.type === "ping" || obj.type === "pong"){
        // 如果你希望在 UI 上显示 ping，可以改成 addSystem
        return;
      }

      if(obj.type === "chat"){
        // ✅ 防回环：来自自己 clientId 的消息，直接丢弃（避免“自己看到两遍”）
        // 说明：我们本地已经显示了自己发送的那条
        if(obj.clientId && obj.clientId === clientId){
          // 也可以在这里做“已送达”提示，但别再加新气泡
          return;
        }

        // ✅ 去重：同 id 不重复显示
        if(obj.id && seenMsgIds.has(obj.id)){
          return;
        }
        rememberMsg(obj.id);

        addBubble({
          me: false,
          sender: obj.from ?? "unknown",
          text: String(obj.text ?? ""),
          time: nowTime()
        });
        return;
      }

      // 其它类型：作为系统信息显示
      addSystem(`📩 ${data}`);
      return;
    }

    // 3) 纯文本 fallback（兼容你当前后端： "name: msg"）
    // ✅ 防止自己看到两遍：如果后端会回显同样的 "null: xxx"，这仍可能重复
    // 这里做一个“弱规则”：
    // - 如果最近 1 秒内我刚发过同文本，则丢弃
    // 但为了稳定，我们更推荐后端改成 JSON 并带 clientId / msgId
    if(typeof data === "string"){
      if(isLikelyEcho(data)){
        return;
      }
      addBubble({ me: false, sender: "server", text: data, time: nowTime() });
      return;
    }

    addSystem(`📦 收到非文本消息：${String(data)}`);
  }

  // ====== 纯文本回声抑制（fallback） ======
  // 为了兼容旧后端：我们记录最近自己发的文本，短时间内收到同文本就当作回声丢弃
  const recentSelfTexts = [];
  function noteSelfText(t){
    const now = Date.now();
    recentSelfTexts.push({ t, now });
    while(recentSelfTexts.length > 30) recentSelfTexts.shift();
  }
  function isLikelyEcho(incoming){
    const now = Date.now();
    // 清理过期（1.2s）
    for(let i = recentSelfTexts.length - 1; i >= 0; i--){
      if(now - recentSelfTexts[i].now > 1200){
        recentSelfTexts.splice(0, i+1);
        break;
      }
    }
    // 匹配
    return recentSelfTexts.some(x => x.t === incoming);
  }

  // 当我们发送本地气泡时，也记录一份“可能的纯文本回声”
  const _origAddBubble = addBubble;
  addBubble = function(payload){
    if(payload && payload.me && typeof payload.text === "string"){
      // 如果你的旧服务器回显格式是 "name: msg"
      // 这里也顺便把那种格式记一下
      noteSelfText(`${payload.sender}: ${payload.text}`);
      noteSelfText(payload.text);
    }
    return _origAddBubble(payload);
  };

  // ====== 事件绑定 ======
  $("btnSend").onclick = sendChat;

  $("sendMessage").addEventListener("keydown", (ev) => {
    if(ev.key === "Enter" && !ev.shiftKey){
      ev.preventDefault();
      sendChat();
    }
  });

  $("btnDisconnect").onclick = disconnect;

  $("btnReconnect").onclick = () => {
    addSystem("🔄 手动触发重连");
    manualClose = false;
    attempt = 0;
    cleanupWs();
    connect();
  };

  // 页面可见性：回到前台时如果断线，立刻尝试连接（不叠加）
  document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "visible"){
      if(!ws || ws.readyState === WebSocket.CLOSED){
        connect();
      }
    }
  });

  // 避免刷新/关闭留下“幽灵连接”：尽量礼貌关闭
  window.addEventListener("beforeunload", () => {
    try{
      manualClose = true;
      clearReconnectTimer();
      if(ws && ws.readyState === WebSocket.OPEN){
        ws.close(1000, "page unload");
      }
    }catch(_){}
  });

  // ====== 启动自动连接 ======
  setStatus(false, "准备连接…");
  addSystem("✨ 客户端启动：自动连接中（带指数退避重连）");
  connect();
</script>
</body>
</html>
